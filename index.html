<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="culturama-favico.png">
    <link rel="stylesheet" href="css/style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Work+Sans&display=swap" rel="stylesheet">

    <title>Pesquisa Culturama</title>
</head>

<body>
    <header>
        <img src="img/logo-culturama.png" alt="logo culturama">
        <h1>Pesquisa Online</h1>
    </header>
    <section>
        <form action="" method="get">
            <fieldset>
                <legend>Dados Pessoais</legend>

                <label for="name">Nome</label>
                <input id="name" type="text" name="userName" required>
                <br>
                <label for="age">Idade</label>
                <input id="age" type="number" name="userAge" min="12" max="100" required>
                <br>
                <label for="birthDate">Data de nascimento</label>
                <input id="birthDate" type="date" name="userBirthDate">
                <br>
                <label for="email">E-mail</label>
                <input id="email" type="email" name="userEmail">
                <br>
                <label for="phoneNumber">Telefone</label>
                <input id="phoneNumber" type="tel" name="userPhoneNumber" pattern="[0-9]{11}"
                    placeholder="DDD + número sem espaço ou hífen">
                <br>
                <label for="image"> Upload de foto</label>
                <input id="image" type="file" accept="image/*" name="userImage">
                <br>
            </fieldset>

            <fieldset>
                <legend>Perfil</legend>

                <p>Gênero</p>
                <input id="fem" type="radio" name="userGender" value="Feminino">
                <label for="fem">Feminino</label>

                <input id="masc" type="radio" name="userGender" value="Maculino">
                <label for="masc">Masculino</label>

                <input id="notInformed" type="radio" name="userGender" value="notInformed">
                <label for="notInformed">Prefiro não informar</label>

                <br>

                <label for="maritalStatus">Estado civil</label>
                <select id="maritalStatus" name="userMaritalStatus">
                    <option value="notInformed">Selecione...</option>
                    <option value="casado">Casado</option>
                    <option value="solteiro">Solteiro</option>
                    <option value="divorciado">Divorciado</option>
                    <option value="viuvo">Viúvo</option>
                    <option value="uniao estavel">União estável</option>
                </select>

                <label for="State">Estado</label>
                <select id="State" name="userState">
                    <option value="Acre">Acre</option>
                    <option value="Alagoas">Alagoas</option>
                    <option value="Amapá">Amapá</option>
                    <option value="Amazonas">Amazonas</option>
                    <option value="Bahia">Bahia</option>
                    <option value="Ceará">Ceará</option>
                    <option value="Distrito Federal">Distrito Federal</option>
                    <option value="Espírito Santo">Espírito Santo</option>
                    <option value="Goiás">Goiás</option>
                    <option value="Maranhão">Maranhão</option>
                    <option value="Mato Grosso do Sul">Mato Grosso do Sul</option>
                    <option value="Mato Grosso">Mato Grosso</option>
                    <option value="Minas Gerais">Minas Gerais</option>
                    <option value="Pára">Pára</option>
                    <option value="Paraíba">Paraíba</option>
                    <option value="Paraná">Paraná</option>
                    <option value="Pernambuco">Pernambuco</option>
                    <option value="Piauí">Piauí</option>
                    <option value="Rio de Janeiro">Rio de Janeiro</option>
                    <option value="Rio Grande do Norte">Rio Grande do Norte</option>
                    <option value="Rio Grande do Sul">Rio Grande do Sul</option>
                    <option value="">Rondônia</option>
                    <option value="Rondônia">Roraima</option>
                    <option value="Santa Catarina">Santa Catarina</option>
                    <option value="São Paulo">São Paulo</option>
                    <option value="Sergipe">Sergipe</option>
                    <option value="Tocantins">Tocantins</option>
                </select>
                <br>

                <label for="city">Cidade</label>
                <input id="city" type="text" name="userCity">


            </fieldset>

            <fieldset>
                <legend>Hábitos</legend>
                <p>Redes Sociais</p>
                <input id="instagram" type="checkbox" name="social" value="instagram">
                <label for="instagram">Instagram</label>
                <br>
                <input id="facebook" type="checkbox" name="social" value="facebook">
                <label for="facebook">Facebook</label>
                <br>
                <input id="linkedin" type="checkbox" name="social" value="linkedin">
                <label for="linkedin">Linkedin</label>
                <br>
                <input id="x" type="checkbox" name="social" value="x">
                <label for="x">X</label>
                <br>
                <label for="musicStyle">Estilo musical:</label>
                <input list="styleTypes" id="musicStyle" name="userMusicStyle" type="text">
                <datalist id="styleTypes">
                    <option value="Rock">
                    <option value="Pop">
                    <option value="Samba">
                    <option value="sertanejo">

                </datalist>
                <br>
                <label for="favoriteColor">Cor favorita</label>
                <input type="color" name="userFavoriteColor" id="favoriteColor">

            </fieldset>

            

            <fieldset>
                <legend>Opinião</legend>

                <p>O que você acha da qualidade do nosso serviço?</p>

                <input id="great" type="radio" name="userServiceOpinion" value="Otimo">
                <label for="great">Ótima</label><br>

                <input id="good" type="radio" name="userServiceOpinion" value="Boa">
                <label for="good">Boa</label><br>

                <input id="regular" type="radio" name="userServiceOpinion" value="Regular">
                <label for="regular">Regular</label><br>

                <input id="bad" type="radio" name="userServiceOpinion" value="Ruim">
                <label for="bad">Ruim</label><br>

                <label for="comment">Escreva sua opinião:</label>
                <textarea name="userComment" id="comment" placeholder="Digite aqui sua opinião..."></textarea>
            </fieldset>

            <fieldset>
                <legend>Confirmações</legend>

                <input type="checkbox" name="userLgpd" id="userLgpdTerm" value="accept" required>
                <label for="userLgpdTerm">Eu aceito participar da pesquisa</label><br>

                <input type="checkbox" name="userGetResult" id="getResult" value="accept">
                <label for="userLgpdTerm">Desejo receber o resultado por email</label><br>
            </fieldset>

            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>



        </form>
    </section>
</body>

</html>
